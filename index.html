<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Hive</title>
    <!-- PWA / Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hive" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f0f10" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca'
              }
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body { background: #0f0f10; color: #e2e2e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      /* iOS safe-area insets */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .bottom-safe { bottom: env(safe-area-inset-bottom, 0px); }
      .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
      /* Clears bottom nav (64px) + home indicator on mobile */
      .pb-nav { padding-bottom: calc(4rem + env(safe-area-inset-bottom, 0px)); }
      /* Positions element just above the bottom nav bar */
      .bottom-nav-bar { bottom: calc(4rem + env(safe-area-inset-bottom, 0px)); }
      /* Landscape phone override: max-height 500px catches phones but not tablets */
      @media (orientation: landscape) and (max-height: 500px) {
        /* Hide desktop sidebar in landscape phone */
        .hidden.md\:flex.h-full { display: none !important; }
        /* Show mobile bottom nav in landscape phone */
        nav.md\:hidden { display: flex !important; }
        /* Force task detail to full-screen (not 600px side panel) */
        .md\:w-\[600px\] {
          width: 100% !important;
          inset: 0 !important;
          border-left: none !important;
        }
        /* Safe-area insets for landscape notch */
        .md\:w-\[600px\] {
          padding-left: env(safe-area-inset-left, 0px);
          padding-right: env(safe-area-inset-right, 0px);
        }
        /* Keep compact mobile padding in landscape */
        .md\:px-6 { padding-left: 1rem !important; padding-right: 1rem !important; }
        .md\:py-4 { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
        .md\:text-2xl { font-size: 1.25rem !important; }
        .md\:w-32 { width: 5rem !important; }
        /* Keep bottom padding for nav bar */
        .md\:pb-5 { padding-bottom: 5rem !important; }
        /* Force main content to take full width */
        .md\:ml-0 { margin-left: 0 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
